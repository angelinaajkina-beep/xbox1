<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XBOX Site</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <!-- Верхняя панель (navbar) -->
      <nav class="navbar">
        <div class="container logo">
          <img src="./img/xbox.png" alt="XBOX Logo" />
        </div>
        <ul class="nav-links">
          <li><a href="#">Games</a></li>
          <img src="./img/arrow.png" alt="arrow">
          <li><a href="#">Consoles</a></li>
          <img src="./img/arrow.png" alt="arrow">
          <li><a href="#">Community</a></li>
          <img src="./img/arrow.png" alt="arrow">
        </ul>
        <div class="search-box">
          <input type="text" placeholder="Search..." />
        </div>
        <div class="user-profile">
          <img src="./img/user.svg" alt="user">
          <span>My XBOX</span>
          <img src="./img/arrow.png" alt="User Icon" />
        </div>
      </nav>

      <!-- Основной баннер (hero section) -->
      <section class="hero">
        <div class="hero-text">
          <h1>Call of Duty: WWII</h1>
          <p>Released on: 23/11/2017</p>
        </div>
        <div class="buttons">
          <button class="btn">Order Now</button>
          <button class="btn">More Games</button>
        </div>
      </section>
    </header>
  </body>
</html>
