<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XBOX Site</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <!-- Верхняя панель (navbar) -->
      <nav class="navbar">
        <div class="container logo">
          <img src="./img/xbox.png" alt="XBOX Logo" />
        </div>
        <ul class="nav-links">
          <li><a href="#">Games</a></li>
          <img src="./img/arrow.png" alt="arrow" />
          <li><a href="#">Consoles</a></li>
          <img src="./img/arrow.png" alt="arrow" />
          <li><a href="#">Community</a></li>
          <img src="./img/arrow.png" alt="arrow" />
        </ul>
        <div class="search-box">
          <input type="text" placeholder="Search..." />
        </div>
        <div class="user-profile">
          <img src="./img/user.svg" alt="user" />
          <span>My XBOX</span>
          <img src="./img/arrow.png" alt="User Icon" />
        </div>
      </nav>
    </header>
    <main>
      <!-- Основной баннер (hero section) -->
      <section class="hero">
        <div class="hero-text">
          <h1>Call of Duty: WWII</h1>
          <p>Released on: 23/11/2017</p>
        </div>
        <div class="buttons">
          <button class="btn">Order Now</button>
          <button class="btn">More Games</button>
        </div>
      </section>

      <section class="info-section">
        <h2 class="info-title">Call of Duty: WWII</h2>
        <div class="info-buttons">
          <button class="btn btn-order">Order Now</button>
          <button class="btn btn-tech">Technical Specifications</button>
        </div>

        <div class="video-section">
          <div class="video-container">
            <img src="./img/Video.png" class="video-thumbnail" />
            <div class="play-button"></div>
          </div>
        </div>

        <div class="content-section">
          <div class="content-row">
            <div class="content-text">
              <h2>Life Advice Looking<br />Through A Window</h2>
            </div>
            <div class="content-image">
              <img
                src="./img/3.png"
                alt="Soldier in winter"
              />
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
